name: Deploy portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack & activate Yarn 1
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build (production)
        env:
          # Pas de backend → le formulaire bascule en mailto:
          REACT_APP_BACKEND_URL: ""
          # CI=true ferait échouer le build sur les warnings ESLint
          CI: "false"
          # Évite les soucis de mémoire sur certains runners
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: yarn build

      - name: Verify build output
        run: |
          ls -la build/
          test -f build/index.html || (echo "❌ index.html manquant" && exit 1)
          echo "✅ Build OK"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
